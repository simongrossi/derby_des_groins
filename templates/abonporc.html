<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐽 A BON PORC — Jeu de Cartes Décalé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Nunito', sans-serif; }
        .font-title { font-family: 'Lilita One', cursive; }
        body { background: #1a2a1a; color: #f0f0f0; min-height: 100vh; overflow-x: hidden; padding-bottom: 250px; }

        /* Plateau de jeu */
        .table-area {
            background: radial-gradient(circle, rgba(40,80,40,0.4) 0%, rgba(0,0,0,0.6) 100%);
            border: 6px solid #3d2b1f; border-radius: 80px; padding: 2rem;
            min-height: 550px; position: relative; box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
        }

        /* Zones joueurs */
        .player-zone { position: absolute; width: 220px; text-align: center; transition: all 0.5s ease; }
        .zone-top { top: 30px; left: 50%; transform: translateX(-50%); }
        .zone-bottom { bottom: 30px; left: 50%; transform: translateX(-50%); }
        .zone-left { left: 40px; top: 50%; transform: translateY(-50%); }
        .zone-right { right: 40px; top: 50%; transform: translateY(-50%); }

        /* Style des cartes */
        .card-visual {
            width: 110px; height: 160px; background: #fff; color: #333; border-radius: 12px; border: 3px solid #444;
            display: inline-flex; flex-direction: column; justify-content: space-between; padding: 8px;
            font-size: 0.75rem; box-shadow: 0 6px 15px rgba(0,0,0,0.5); transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; cursor: pointer; user-select: none;
        }
        .card-visual:hover { transform: translateY(-20px) scale(1.1) rotate(2deg); z-index: 100; box-shadow: 0 20px 40px rgba(0,0,0,0.7); border-color: #fff; }

        .card-type-vehicle { background: linear-gradient(135deg, #f1f5f9 0%, #94a3b8 100%); border-color: #475569; }
        .card-type-gray_card { background: linear-gradient(135deg, #dcfce7 0%, #4ade80 100%); border-color: #166534; }
        .card-type-trailer { background: linear-gradient(135deg, #fef9c3 0%, #facc15 100%); border-color: #854d0e; }
        .card-type-larcin { background: linear-gradient(135deg, #fee2e2 0%, #f87171 100%); border-color: #991b1b; }

        /* Conteneur de la main */
        .my-hand-wrapper {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(20,40,20,0.9) 100%);
            padding: 20px 40px; border-top: 5px solid #4ade80; z-index: 9999;
            display: flex; justify-content: center; align-items: flex-end;
            min-height: 200px; gap: 10px;
        }

        .stat-badge { background: rgba(0,0,0,0.7); color: white; padding: 2px 6px; border-radius: 6px; font-weight: 900; font-size: 0.65rem; border: 1px solid rgba(255,255,255,0.2); }
        .hand-label { position: absolute; top: -35px; left: 50%; transform: translateX(-50%); background: #4ade80; color: #1a2a1a; padding: 4px 15px; border-radius: 15px 15px 0 0; font-weight: 900; font-size: 0.8rem; text-transform: uppercase; }
    </style>
</head>
<body class="p-4">
    {% include "_site_header.html" %}

    <div class="max-w-7xl mx-auto mt-8">
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-4">
                <span class="text-6xl drop-shadow-lg">🐽</span>
                <h1 class="font-title text-6xl text-green-400 tracking-tight drop-shadow-[0_0_15px_rgba(74,222,128,0.5)]">A BON PORC</h1>
            </div>
            <div id="status-badge" class="px-8 py-3 rounded-2xl bg-black/40 border-2 border-green-500/50 text-green-400 font-black tracking-widest uppercase text-xl">LOBBY</div>
        </div>

        <div class="table-area" id="game-table">
            <div id="players-container"></div>

            <!-- Zone centrale -->
            <div id="center-pigs" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-center bg-black/20 p-8 rounded-full border-2 border-white/5 backdrop-blur-sm">
                <div id="waiting-msg" class="text-2xl font-black text-white/30 uppercase italic">En attente des gorets...</div>
            </div>
        </div>

        <!-- Main du joueur -->
        <div id="my-hand-container" class="my-hand-wrapper hidden">
            <div class="hand-label">Ma Main de Cochon</div>
            <div id="cards-row" class="flex gap-3 items-end">
                <!-- Cartes injectées ici -->
            </div>
        </div>

        <!-- Interface de Lobby -->
        <div id="lobby-ui" class="mt-8 card p-12 bg-black/70 backdrop-blur-xl border-2 border-white/10 rounded-[2rem] text-center shadow-[0_25px_50px_-12px_rgba(0,0,0,0.8)]">
            <div id="join-section">
                <h2 class="font-title text-4xl mb-8 text-white">Prêt pour la foire ?</h2>
                <button onclick="joinGame()" class="group relative px-12 py-6 bg-green-600 hover:bg-green-500 text-white font-black rounded-2xl text-3xl transition-all transform hover:scale-105 shadow-[0_0_30px_rgba(22,163,74,0.4)]">
                    REJOINDRE LA PARTIE
                </button>
            </div>

            <div id="vote-section" class="hidden">
                <p class="font-bold text-2xl mb-8 text-green-200 uppercase tracking-wide">Misez sur la partie :</p>
                <div class="flex justify-center gap-8">
                    {% for opt in buy_in_options %}
                    <button id="vote-btn-{{ opt }}" onclick="voteBuyIn({{ opt }})" class="px-10 py-5 bg-white/5 hover:bg-white/15 border-2 border-white/20 rounded-2xl font-black text-2xl transition-all hover:border-yellow-500/50">{{ opt }} 🪙</button>
                    {% endfor %}
                </div>
            </div>

            <div id="start-section" class="hidden mt-10 border-t-2 border-white/5 pt-10">
                <button onclick="startGame()" class="px-16 py-8 bg-pink-600 hover:bg-pink-500 text-white font-black rounded-[2rem] text-4xl animate-pulse shadow-[0_0_50px_rgba(219,39,119,0.5)] transform hover:scale-110 transition-transform">
                    LANCER LA PARTIE ! 🐽
                </button>
            </div>
        </div>
    </div>

    <script>
        let gameState = {};
        const csrfToken = "{{ csrf_token() }}";

        async function refreshState() {
            try {
                const res = await fetch('/abonporc/state');
                const data = await res.json();
                gameState = data;
                renderGame();
            } catch (e) { console.error('Erreur refresh:', e); }
        }

        function renderGame() {
            const statusBadge = document.getElementById('status-badge');
            const playersCont = document.getElementById('players-container');
            const lobbyUi = document.getElementById('lobby-ui');
            const joinSec = document.getElementById('join-section');
            const voteSec = document.getElementById('vote-section');
            const startSec = document.getElementById('start-section');
            const handCont = document.getElementById('my-hand-container');
            const cardsRow = document.getElementById('cards-row');

            // Logique d'affichage Lobby
            if (gameState.status === 'no_table' || !gameState.my_seat) {
                joinSec.classList.remove('hidden');
                voteSec.classList.add('hidden');
            } else {
                joinSec.classList.add('hidden');
                voteSec.classList.remove('hidden');
                const me = gameState.players.find(p => p.is_me);
                if (me && me.vote) {
                    document.querySelectorAll('#vote-section button').forEach(b => b.classList.remove('bg-yellow-500', 'text-black', 'scale-110', 'border-yellow-400'));
                    const btn = document.getElementById('vote-btn-' + me.vote);
                    if (btn) btn.classList.add('bg-yellow-500', 'text-black', 'scale-110', 'border-yellow-400');
                }
            }

            if (gameState.unanimous && gameState.status !== 'playing') {
                startSec.classList.remove('hidden');
            } else {
                startSec.classList.add('hidden');
            }

            // Phase de jeu
            if (gameState.status === 'playing') {
                lobbyUi.classList.add('hidden');
                handCont.classList.remove('hidden');
                statusBadge.innerText = "PHASE: " + (gameState.phase ? gameState.phase.toUpperCase() : 'LIVRAISON');

                const me = gameState.players.find(p => p.is_me);
                if (me) {
                    if (me.hand && me.hand.length > 0) {
                        cardsRow.innerHTML = me.hand.map(c => renderCard(c)).join('');
                    } else {
                        cardsRow.innerHTML = '<div class="text-white/40 italic font-bold">Ta main est vide... pour l\'instant !</div>';
                    }
                }
            } else {
                handCont.classList.add('hidden');
            }

            // Statut badge
            if (gameState.status === 'voting') {
                statusBadge.innerText = "VOTES EN COURS";
            } else if (gameState.status === 'lobby') {
                statusBadge.innerText = "LOBBY - RECRUTEMENT";
            }

            // Rendu des joueurs sur la table
            if (gameState.players) {
                playersCont.innerHTML = gameState.players.map(p => {
                    const posClass = getPosClass(p.seat, gameState.my_seat || 1);
                    return `
                        <div class="player-zone ${posClass}">
                            <div class="font-black text-pink-400 mb-2 uppercase tracking-tighter text-2xl drop-shadow-lg">${p.username} ${p.is_me ? '<span class="text-green-400">(MOI)</span>' : ''}</div>
                            <div class="flex flex-col gap-3 items-center">
                                ${p.vehicle ? renderCard(p.vehicle, true) : '<div class="w-16 h-24 border-2 border-dashed border-white/20 rounded-2xl flex items-center justify-center text-[8px] opacity-20 font-black uppercase text-center p-2">Emplacement<br>Véhicule</div>'}
                                <div class="px-4 py-1 rounded-full bg-black/40 text-xs font-black uppercase tracking-widest ${p.vote ? 'text-green-400' : 'text-white/20'}">
                                    ${p.vote ? 'Mise: ' + p.vote + ' 🪙' : 'Réfléchit...'}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
                document.getElementById('waiting-msg').classList.toggle('hidden', gameState.players.length > 0);
            }
        }

        function renderCard(c, small = false) {
            if (!c) return '';
            const sizeClasses = small ? 'w-16 h-24 text-[0.45rem] p-1.5' : 'w-[110px] h-[160px] p-2';
            const statStyle = small ? 'font-black text-[0.55rem]' : 'font-black text-[0.7rem]';

            return `
                <div class="card-visual card-type-${c.type} ${sizeClasses}">
                    <div class="font-black uppercase leading-tight border-b-2 border-black/10 pb-1 mb-1 truncate" title="${c.name}">${c.name}</div>
                    <div class="flex-1 py-1 text-[0.6rem] font-bold italic opacity-80 leading-tight overflow-hidden">
                        ${c.desc || c.power || ''}
                    </div>
                    <div class="flex justify-between items-center mt-auto pt-1 border-t border-black/5">
                        ${c.v !== undefined ? `<span class="stat-badge">V:${c.v}</span>` : ''}
                        ${c.c !== undefined ? `<span class="stat-badge">C:${c.c}</span>` : ''}
                        ${c.plus_c !== undefined ? `<span class="stat-badge">+C:${c.plus_c}</span>` : ''}
                    </div>
                </div>
            `;
        }

        function getPosClass(seat, mySeat) {
            const diff = (seat - mySeat + 4) % 4;
            if (diff === 0) return 'zone-bottom';
            if (diff === 1) return 'zone-left';
            if (diff === 2) return 'zone-top';
            if (diff === 3) return 'zone-right';
            return 'zone-bottom';
        }

        async function joinGame() {
            await fetch('/abonporc/join', { method: 'POST', headers: { 'X-CSRFToken': csrfToken } });
            refreshState();
        }

        async function voteBuyIn(amount) {
            await fetch('/abonporc/vote', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
                body: JSON.stringify({ buy_in: amount })
            });
            refreshState();
        }

        async function startGame() {
            const res = await fetch('/abonporc/start', { method: 'POST', headers: { 'X-CSRFToken': csrfToken } });
            const data = await res.json();
            if (!data.ok) alert(data.error);
            refreshState();
        }

        // Démarrage auto
        setInterval(refreshState, 3000);
        refreshState();
    </script>
</body>
</html>
