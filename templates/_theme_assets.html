<script>
(function () {
    var storageKey = 'derby-theme';

    function getTheme() {
        var stored = null;
        try {
            stored = localStorage.getItem(storageKey);
        } catch (e) {
            stored = null;
        }
        return stored === 'light' || stored === 'dark' ? stored : 'dark';
    }

    function applyTheme(theme) {
        var root = document.documentElement;
        if (!root) return false;
        root.setAttribute('data-theme', theme);
        return true;
    }

    window.__derbySetTheme = function (theme) {
        if (!applyTheme(theme)) return;
        try {
            localStorage.setItem(storageKey, theme);
        } catch (e) {}
        var lightMode = theme === 'light';
        document.querySelectorAll('[data-theme-toggle-label]').forEach(function (node) {
            node.textContent = lightMode ? 'Sombre' : 'Clair';
        });
        document.querySelectorAll('[data-theme-toggle-icon]').forEach(function (node) {
            node.textContent = lightMode ? '🌙' : '☀️';
        });
        document.querySelectorAll('[data-theme-toggle]').forEach(function (node) {
            node.setAttribute('aria-pressed', lightMode ? 'true' : 'false');
            node.setAttribute('title', lightMode ? 'Passer au mode sombre' : 'Passer au mode clair');
        });
        document.dispatchEvent(new CustomEvent('derby-theme-change', { detail: { theme: theme } }));
    };

    function initTheme() {
        window.__derbySetTheme(getTheme());
    }

    if (!applyTheme(getTheme())) {
        document.addEventListener('DOMContentLoaded', initTheme, { once: true });
    } else {
        document.addEventListener('DOMContentLoaded', initTheme, { once: true });
    }

    document.addEventListener('click', function (event) {
        var toggle = event.target.closest('[data-theme-toggle]');
        if (!toggle) return;
        var current = document.documentElement.getAttribute('data-theme') || getTheme();
        window.__derbySetTheme(current === 'light' ? 'dark' : 'light');
    });
})();
</script>
