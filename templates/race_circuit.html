<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Derby des Groins — Circuit Live</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; overflow: hidden; background: #080d1a; color: white; font-family: system-ui, sans-serif; }
    #circuit-wrap { position: fixed; inset: 0; z-index: 1; display: flex; }
    #svg-area { flex: 1; min-width: 0; display: flex; align-items: center; justify-content: center; background: radial-gradient(ellipse at 60% 40%, rgba(22,57,96,0.35), transparent 70%), #080d1a; }
    #stats-panel { width: 300px; flex-shrink: 0; background: linear-gradient(180deg, rgba(15,10,30,0.98), rgba(8,6,18,0.99)); border-left: 1px solid rgba(255,255,255,0.06); overflow-y: auto; padding: 1rem; }
    @media (max-width: 767px) { #circuit-wrap { flex-direction: column; } #svg-area { flex: 1; min-height: 0; } #stats-panel { width: 100%; height: 40vh; border-left: none; border-top: 1px solid rgba(255,255,255,0.06); } }
    .track-bg { fill: none; stroke: rgba(255,255,255,0.06); stroke-linecap: round; }
    .pig-marker { transition: transform 0.45s linear; }
    .pig-label { font-size: 10px; fill: white; text-anchor: middle; dominant-baseline: hanging; opacity: 0.7; }
    #countdown-overlay { position: fixed; inset: 0; z-index: 50; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); pointer-events: none; }
    #countdown-text { font-size: clamp(4rem, 20vw, 12rem); font-weight: 900; background: linear-gradient(135deg, #fbbf24, #f97316); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    #victory-overlay { position: fixed; inset: 0; z-index: 60; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); }
    #victory-overlay.active { display: flex; }
    .victory-card { text-align: center; }
    #lobby-overlay { position: fixed; inset: 0; z-index: 40; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(ellipse at center, rgba(39,13,49,0.97), rgba(8,6,18,0.99)); }
    .pig-stat-card { border: 1px solid rgba(255,255,255,0.06); border-radius: 0.75rem; padding: 0.6rem 0.75rem; margin-bottom: 0.5rem; background: rgba(255,255,255,0.02); }
    .stat-mini-bar { height: 3px; border-radius: 2px; transition: width 0.4s ease; }
    .stat-mini-bar-bg { background: rgba(255,255,255,0.06); }
    #toolbar { position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%); z-index: 30; display: flex; gap: 0.5rem; padding: 0.5rem; border-radius: 1rem; background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(12px); }
    .tb-btn { padding: 0.4rem 0.8rem; border-radius: 0.5rem; font-size: 0.75rem; font-weight: 700; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.7); cursor: pointer; }
  </style>
</head>
<body>
  <div id="loading-overlay" style="position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#080d1a;">
    <div style="font-size:3rem;">🐷</div>
    <p style="margin-top:1rem;color:rgba(255,255,255,0.4);font-size:0.85rem;">Chargement du circuit…</p>
  </div>

  <div id="lobby-overlay" style="display:none;">
    <div class="text-center space-y-6 max-w-xl px-4">
      <p class="text-sm uppercase tracking-[0.35em] text-amber-200/60">Prochaine course (5 tours)</p>
      <h1 class="text-5xl font-black text-amber-100">🏁 Course #<span id="lobby-race-id">—</span></h1>
      <div id="lobby-countdown" class="text-7xl font-black text-amber-300">—</div>
      <div id="lobby-participants" class="grid grid-cols-2 gap-2 mt-6 text-left"></div>
      <div id="lobby-bets" class="mt-4 text-left space-y-1"></div>
    </div>
  </div>

  <div id="countdown-overlay" style="display:none;"><div id="countdown-text">3</div></div>

  <div id="idle-overlay" style="position:fixed;inset:0;z-index:35;display:none;flex-direction:column;align-items:center;justify-content:center;background:#080d1a;">
    <div class="text-center space-y-6">
      <div style="font-size:5rem;">🐷</div>
      <h1 class="text-4xl font-black text-white/80">Aucune course en cours</h1>
      <div id="idle-next-info" class="text-sm text-white/30"></div>
      <button onclick="closeCircuit()" class="px-5 py-2.5 rounded-xl border border-white/10 bg-white/5 text-white/60 font-bold">✕ Fermer</button>
    </div>
  </div>

  <div id="circuit-wrap" style="display:none;">
    <div id="svg-area">
      <svg id="circuit-svg" viewBox="0 0 900 600" preserveAspectRatio="xMidYMid meet" style="width:95%; height:95%;">
        <g id="track-group">
          <path id="track-bg-path" class="track-bg" stroke-width="48" d="M 150 300 A 300 220 0 1 1 750 300 A 300 220 0 1 1 150 300 Z"/>
          <line id="finish-line" x1="150" y1="270" x2="150" y2="330" stroke="#fde047" stroke-width="4" stroke-dasharray="5,3" opacity="0.8"/>
          <g id="pigs-g"></g>
        </g>
      </svg>
      <div style="position:absolute; top:1rem; left:1rem; font-size:0.7rem; color:rgba(255,255,255,0.4);">
        <span id="info-race">—</span> · <span id="info-turn">Tour 0</span> · 🏁 5 tours
      </div>
    </div>
    <div id="stats-panel">
      <div class="text-xs uppercase tracking-[0.3em] text-white/30 mb-3">Participants</div>
      <div id="stats-cards"></div>
      <div id="stats-bets" class="text-xs text-white/50 space-y-1 mt-4"></div>
    </div>
  </div>

  <div id="victory-overlay">
    <div class="victory-card space-y-4">
      <div id="victory-emoji" style="font-size:6rem;"></div>
      <div class="text-4xl font-black text-amber-200" id="victory-name"></div>
      <div id="victory-podium" class="mt-6 space-y-1 text-sm"></div>
      <button onclick="closeCircuit()" class="mt-6 tb-btn">Fermer</button>
    </div>
  </div>

  <div id="toolbar" style="display:none;">
    <button class="tb-btn" onclick="cycleSpeed()" id="btn-speed">⏩ x1</button>
    <button class="tb-btn" onclick="closeCircuit()">✕ Fermer</button>
  </div>

<script>
const PIG_COLORS = ['#f87171','#fb923c','#facc15','#4ade80','#22d3ee','#818cf8','#e879f9','#f472b6','#a3e635','#fca5a5','#fdba74','#fde68a'];
let replayData = null; let totalLength = 3000; let turnIndex = 0; let isPlaying = false; let playInterval = null; let speedMultiplier = 1;
let lastFinishedRaceId = null; let currentPhase = 'idle'; let pathElement = null; let pathLength = 0;
let victoryHold = false; // Flag pour empêcher le polling de masquer l'écran de victoire

function initTrack() {
  pathElement = document.getElementById('track-bg-path');
  pathLength = pathElement.getTotalLength();
}

function pigVisualHTML(pig, size = 24) {
  if (pig.avatar_url) return `<img src="${pig.avatar_url}" width="${size}" height="${size}" style="image-rendering:pixelated;border-radius:4px;display:inline-block;">`;
  return `<span style="font-size:${Math.round(size * 0.8)}px;">${pig.emoji || '🐷'}</span>`;
}

function createPigMarkers(pigsData) {
  const g = document.getElementById('pigs-g'); g.innerHTML = '';
  pigsData.forEach((pig, i) => {
    const group = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    group.setAttribute('class', 'pig-marker'); group.setAttribute('id', `pig-${pig.id}`);
    const emoji = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    emoji.setAttribute('font-size', '22'); emoji.setAttribute('text-anchor', 'middle'); emoji.setAttribute('dominant-baseline', 'central');
    emoji.textContent = pig.emoji || '🐷';
    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.setAttribute('class', 'pig-label'); label.setAttribute('dy', '18'); label.textContent = (pig.name || '').substring(0, 10);
    group.append(emoji, label); g.append(group);
  });
}

function updatePositions(turnData) {
  turnData.pigs.forEach((pig, i) => {
    const el = document.getElementById(`pig-${pig.id}`); if (!el) return;
    const lapDistance = 600;
    const distanceInLap = pig.distance % lapDistance;
    const ratio = distanceInLap / lapDistance;
    const pt = pathElement.getPointAtLength(ratio * pathLength);
    const offset = (i - 4) * 4;
    el.setAttribute('transform', `translate(${pt.x}, ${pt.y + offset})`);
  });
}

function startAnimation(replay) {
  replayData = replay; turnIndex = 0; totalLength = 3000; isPlaying = true; victoryHold = true;
  const pigs = replay.turns[0].pigs.map(p => ({ id: p.id, name: p.name, emoji: '🐷' }));
  if (replay.participant_meta) {
    pigs.forEach(p => { const m = replay.participant_meta[String(p.id)]; if (m) { p.emoji = m.emoji; p.avatar_url = m.avatar_url; } });
  }
  createPigMarkers(pigs);
  const container = document.getElementById('stats-cards'); container.innerHTML = pigs.map((p, i) => `<div class="pig-stat-card" id="stat-${p.id}"><div class="flex items-center gap-2">${pigVisualHTML(p, 20)} <span class="text-xs font-bold" style="color:${PIG_COLORS[i%12]}">${p.name}</span> <span class="ml-auto text-[10px]" id="stat-pos-${p.id}">#—</span></div><div class="stat-mini-bar-bg mt-2"><div class="stat-mini-bar" id="bar-${p.id}" style="width:0%; background:#22d3ee"></div></div></div>`).join('');

  document.getElementById('idle-overlay').style.display = 'none';
  document.getElementById('lobby-overlay').style.display = 'none';
  document.getElementById('circuit-wrap').style.display = 'flex';
  document.getElementById('toolbar').style.display = 'flex';
  document.getElementById('info-race').textContent = `Course #${replay.race_id || '?'}`;
  playTick();
}

function playTick() {
  if (!isPlaying || !replayData || turnIndex >= replayData.turns.length) { finishAnimation(); return; }
  const turn = replayData.turns[turnIndex];
  updatePositions(turn);
  const sorted = [...turn.pigs].sort((a,b) => b.distance - a.distance);
  turn.pigs.forEach(p => {
    const pEl = document.getElementById(`stat-pos-${p.id}`); if (!pEl) return;
    const pos = sorted.findIndex(s => s.id === p.id) + 1;
    pEl.textContent = p.is_finished ? '🏁' : `#${pos}`;
    document.getElementById(`bar-${p.id}`).style.width = `${(p.distance / 3000) * 100}%`;
  });
  document.getElementById('info-turn').textContent = `Tour ${Math.min(5, Math.floor(sorted[0].distance / 600) + 1)} / 5`;
  turnIndex++;
  playInterval = setTimeout(playTick, 500 / speedMultiplier);
}

function finishAnimation() {
  isPlaying = false;
  const last = replayData.turns[replayData.turns.length - 1];
  const winner = [...last.pigs].sort((a,b) => b.distance - a.distance)[0];
  document.getElementById('victory-name').textContent = `${winner.name} GAGNE !`;
  document.getElementById('victory-overlay').classList.add('active');

  // On maintient l'écran de victoire pendant 15 secondes avant de laisser le polling reprendre la main
  setTimeout(() => { victoryHold = false; }, 15000);
}

function cycleSpeed() { speedMultiplier = speedMultiplier === 1 ? 2 : (speedMultiplier === 2 ? 4 : 1); document.getElementById('btn-speed').textContent = `⏩ x${speedMultiplier}`; }
function closeCircuit() {
  isPlaying = false; victoryHold = false;
  if (window.parent && window.parent !== window) window.parent.postMessage('close-global-circuit', '*');
  else window.location.href = '/';
}

async function pollState() {
  // Si on est en train de jouer l'animation ou de montrer la victoire, on ne touche à rien
  if (isPlaying || victoryHold) return;

  try {
    const r = await fetch('/api/race/live-state'); const s = await r.json();
    if (document.getElementById('loading-overlay')) document.getElementById('loading-overlay').style.display = 'none';

    // Si une nouvelle course vient de finir, on lance l'animation
    if (s.finished_race_id && s.finished_race_id !== lastFinishedRaceId) {
      lastFinishedRaceId = s.finished_race_id;
      const repR = await fetch(`/api/race/${s.finished_race_id}/replay`); const rep = await repR.json();
      if (rep.turns) {
        startAnimation(rep);
        return; // On sort pour laisser l'animation prendre le contrôle
      }
    }

    // Gestion des overlays de transition (seulement si on ne joue pas)
    currentPhase = s.phase;
    if (s.phase === 'idle') {
      document.getElementById('idle-overlay').style.display = 'flex';
      document.getElementById('lobby-overlay').style.display = 'none';
      document.getElementById('victory-overlay').classList.remove('active');
      document.getElementById('circuit-wrap').style.display = 'none';
      document.getElementById('idle-next-info').textContent = s.seconds_to_start ? `Prochaine course dans ${Math.floor(s.seconds_to_start/60)}m ${s.seconds_to_start%60}s` : 'Aucune course prévue';
    } else if (s.phase === 'pre_race' || s.phase === 'countdown') {
      document.getElementById('idle-overlay').style.display = 'none';
      document.getElementById('victory-overlay').classList.remove('active');
      document.getElementById('circuit-wrap').style.display = 'none';
      document.getElementById('lobby-overlay').style.display = 'flex';
      document.getElementById('lobby-race-id').textContent = s.race_id;
      document.getElementById('lobby-countdown').textContent = `${s.seconds_to_start}s`;
    } else if (s.phase === 'racing') {
      document.getElementById('lobby-overlay').style.display = 'none';
      // Attente de la fin de course serveur
    }
  } catch(e) {}
}

document.addEventListener('DOMContentLoaded', () => { initTrack(); pollState(); setInterval(pollState, 3000); });
</script>
</body>
</html>
